{% extends 'base.html' %}

{% block content %}

<style>

/* Keep same theme as base.html */
.login-wrapper {
    height: 90vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 💎 Glass Card */
.login-box {
    width: 360px;
    padding: 35px;
    border-radius: 20px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);

    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    text-align: center;
    color: white;

    animation: fadeIn 1s ease;
}

/* Hover glow */
.login-box:hover {
    transform: translateY(-5px) scale(1.02);
    box-shadow: 0 0 25px #00e676;
}

/* Heading */
.login-box h2 {
    margin-bottom: 10px;
    font-weight: 600;
}

.login-box p {
    font-size: 14px;
    opacity: 0.8;
}

/* Inputs */
.input-box {
    margin: 20px 0;
}

.input-box input {
    width: 100%;
    padding: 12px;
    border-radius: 25px;
    border: none;
    outline: none;

    background: rgba(255,255,255,0.15);
    color: white;
}

/* Placeholder */
.input-box input::placeholder {
    color: #ccc;
}

/* Glow effect */
.input-box input:focus {
    box-shadow: 0 0 12px #00e676;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border-radius: 25px;
    border: none;

    background: linear-gradient(45deg, #00c853, #64dd17);
    color: white;
    font-weight: bold;

    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #00e676;
}

/* Messages */
ul.messages {
    list-style: none;
    padding: 0;
    margin-bottom: 10px;
}

ul.messages li {
    color: #ff5252;
    font-weight: bold;
}

/* Animation */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}

</style>

<div class="login-wrapper">

    <div class="login-box">

        <h2>🌾 Welcome Back</h2>
        <p>Login to continue your journey</p>

        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li>{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="input-box">
                <input type="text" name="username" placeholder="👤 Username" required>
            </div>

            <div class="input-box">
                <input type="password" name="password" placeholder="🔒 Password" required>
            </div>

            <button type="submit">Login</button>
        </form>

    </div>

</div>

{% endblock %}
